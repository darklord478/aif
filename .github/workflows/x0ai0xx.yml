name: 🚀 Smart Secure Release (Independent ZIPs)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  job:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧠 Get Commit Message
        id: commit
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🔍 Extract URLs
        id: extract
        run: |
          urls=$(echo "${{ steps.commit.outputs.msg }}" | grep -oP '(?<=release: ).*')
          if [ -z "$urls" ]; then
            echo "❌ no command"
            exit 0
          fi
          echo "urls=$urls" >> $GITHUB_OUTPUT

      - name: ⚡ Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 p7zip-full bc

      - name: 📥 Download Files
        run: |
          mkdir -p files
          cd files
          for url in ${{ steps.extract.outputs.urls }}
          do
            echo "⬇️ $url"
            aria2c -x 16 -s 16 --continue=true "$url"
          done

      - name: 🇮🇷 Set Iran Time
        id: time
        run: |
          sudo timedatectl set-timezone Asia/Tehran
          echo "date=$(date +"%Y.%m.%d-%H-%M")" >> $GITHUB_OUTPUT

      - name: 🔐 Hidden Password
        id: pass
        run: |
          echo "pass=$(echo MTk5ODEzNzc= | base64 -d)" >> $GITHUB_OUTPUT

      - name: 📦 Smart Independent ZIP Builder
        id: zipstep
        run: |
          mkdir -p zips

          PASS="${{ steps.pass.outputs.pass }}"
          DATE="${{ steps.time.outputs.date }}"

          # سایز رندوم بین 1500 تا 1700
          TARGET=$((1500 + RANDOM % 200))
          TARGET_BYTES=$((TARGET * 1024 * 1024))

          PART=1
          CURRENT_SIZE=0
          FILE_COUNT=0
          TOTAL_SIZE=0

          declare -a FILE_LIST=()

          create_zip () {
            if [ ${#FILE_LIST[@]} -gt 0 ]; then
              NAME="${DATE}-${PART}.zip"
              echo "📦 Creating $NAME"

              7z a -tzip -p"$PASS" -mem=AES256 "zips/$NAME" "${FILE_LIST[@]}"

              PART=$((PART+1))
              FILE_LIST=()
              CURRENT_SIZE=0
            fi
          }

          for file in files/*
          do
            [ -f "$file" ] || continue

            SIZE=$(stat -c%s "$file")

            if [ $((CURRENT_SIZE + SIZE)) -gt $TARGET_BYTES ]; then
              create_zip
            fi

            FILE_LIST+=("$file")
            CURRENT_SIZE=$((CURRENT_SIZE + SIZE))
            TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
            FILE_COUNT=$((FILE_COUNT + 1))
          done

          create_zip

          PARTS=$((PART-1))

          GB=$(echo "$TOTAL_SIZE/1073741824" | bc)
          MB=$(echo "($TOTAL_SIZE%1073741824)/1048576" | bc)

          echo "files=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "parts=$PARTS" >> $GITHUB_OUTPUT
          echo "gb=$GB" >> $GITHUB_OUTPUT
          echo "mb=$MB" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: 🏷 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_id }}
          name: 📦 Smart Release ${{ github.run_id }}
          body: |
            📦 تعداد فایل‌ها: ${{ steps.zipstep.outputs.files }}

            🧩 تعداد پارت‌ها: ${{ steps.zipstep.outputs.parts }}

            💾 حجم کل:
            ${{ steps.zipstep.outputs.gb }} گیگ و ${{ steps.zipstep.outputs.mb }} مگ

            📁 سایز هر پارت:
            حدود ${{ steps.zipstep.outputs.target }} مگابایت

            🇮🇷 زمان ساخت:
            ${{ steps.time.outputs.date }}
          files: zips/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
