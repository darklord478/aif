name: Ultra Zip Engine 🚀

on:
  workflow_dispatch:
    inputs:
      links:
        description: "Paste links separated by *"
        required: true

      password:
        description: "Zip Password (optional)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      #######################################################
      # TIMEZONE
      #######################################################

      - name: Set Iran Timezone
        run: |
          sudo timedatectl set-timezone Asia/Tehran
          date

      #######################################################
      # INSTALL TOOLS
      #######################################################

      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            aria2 \
            p7zip-full \
            zip \
            unzip \
            ffmpeg \
            rename \
            fdupes \
            python3-pip

          pip install \
            jdatetime \
            qrcode[pil] \
            yt-dlp

      #######################################################
      # CREATE FOLDERS
      #######################################################

      - name: Create Directories
        run: |
          mkdir -p downloads
          mkdir -p output

      #######################################################
      # DOWNLOAD FILES
      #######################################################

      - name: Download Files
        run: |
          IFS='*' read -ra URLS <<< "${{ github.event.inputs.links }}"

          for url in "${URLS[@]}"; do
            echo "Downloading: $url"

            aria2c \
              --continue=true \
              --max-tries=10 \
              --retry-wait=5 \
              --split=16 \
              --max-connection-per-server=16 \
              --console-log-level=notice \
              --dir=downloads \
              "$url"
          done

      #######################################################
      # REMOVE DUPLICATES
      #######################################################

      - name: Remove Duplicate Files
        run: |
          fdupes -rdN downloads || true

      #######################################################
      # AUTO RENAME FILES
      #######################################################

      - name: Rename Files
        run: |
          cd downloads
          rename 's/ /_/g' * || true

      #######################################################
      # YOUTUBE SUPPORT
      #######################################################

      - name: Download YouTube Links
        run: |
          IFS='*' read -ra URLS <<< "${{ github.event.inputs.links }}"

          for url in "${URLS[@]}"; do

            if [[ "$url" == *"youtube.com"* ]] || [[ "$url" == *"youtu.be"* ]]; then

              yt-dlp \
                -f best \
                -o "downloads/%(title)s.%(ext)s" \
                "$url"

            fi

          done

      #######################################################
      # CREATE VIDEO THUMBNAILS
      #######################################################

      - name: Generate Video Thumbnails
        run: |
          find downloads -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" \) | while read file; do

            filename=$(basename "$file")

            ffmpeg -y \
              -i "$file" \
              -ss 00:00:05 \
              -vframes 1 \
              "output/${filename}.jpg" || true

          done

      #######################################################
      # CREATE VIDEO PREVIEWS
      #######################################################

      - name: Generate Video Previews
        run: |
          find downloads -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" \) | while read file; do

            filename=$(basename "$file")

            ffmpeg -y \
              -i "$file" \
              -vf scale=320:-1 \
              -t 20 \
              "output/preview_${filename}.mp4" || true

          done

      #######################################################
      # SMART ZIP SPLIT
      #######################################################

      - name: Smart Zip Split
        run: |

          TOTAL_SIZE=$(du -sb downloads | cut -f1)
          GB=$((TOTAL_SIZE / 1024 / 1024 / 1024))

          echo "Total Size: $GB GB"

          if [ $GB -lt 2 ]; then

            echo "Creating Single ZIP"

            if [ -n "${{ github.event.inputs.password }}" ]; then

              7z a output/archive.zip downloads/* \
                -p"${{ github.event.inputs.password }}" \
                -mhe=on

            else

              7z a output/archive.zip downloads/*

            fi

          elif [ $GB -lt 20 ]; then

            echo "Creating 500MB Split ZIP"

            if [ -n "${{ github.event.inputs.password }}" ]; then

              7z a output/archive.zip downloads/* \
                -v500m \
                -p"${{ github.event.inputs.password }}" \
                -mhe=on

            else

              7z a output/archive.zip downloads/* -v500m

            fi

          else

            echo "Creating 1GB Split ZIP"

            if [ -n "${{ github.event.inputs.password }}" ]; then

              7z a output/archive.zip downloads/* \
                -v1g \
                -p"${{ github.event.inputs.password }}" \
                -mhe=on

            else

              7z a output/archive.zip downloads/* -v1g

            fi

          fi

      #######################################################
      # GENERATE SHA256
      #######################################################

      - name: Generate SHA256
        run: |
          cd output
          sha256sum * > SHA256.txt || true

      #######################################################
      # GENERATE LINKS FILE
      #######################################################

      - name: Generate Links TXT
        run: |
          touch output/links.txt

          for f in output/*; do
            echo "$f" >> output/links.txt
          done

      #######################################################
      # GENERATE QR CODE
      #######################################################

      - name: Generate QR Code
        run: |
          python3 << EOF
          import qrcode

          img = qrcode.make("GitHub Release Ready")
          img.save("output/qrcode.png")
          EOF

      #######################################################
      # GENERATE HTML PAGE
      #######################################################

      - name: Generate HTML Index
        run: |
          python3 << 'EOF'
          import os
          import hashlib
          import jdatetime

          now = jdatetime.datetime.now()

          html = f'''
          <html>
          <head>
            <meta charset="utf-8">
            <title>Ultra Zip Engine</title>

            <style>
              body {{
                background:#0d1117;
                color:white;
                font-family:Arial;
                padding:40px;
              }}

              h1 {{
                color:#58a6ff;
              }}

              table {{
                width:100%;
                border-collapse:collapse;
                margin-top:20px;
              }}

              td,th {{
                border:1px solid #30363d;
                padding:12px;
                text-align:left;
              }}

              th {{
                background:#161b22;
              }}

              tr:hover {{
                background:#161b22;
              }}

              .box {{
                background:#161b22;
                padding:20px;
                border-radius:12px;
                margin-bottom:20px;
              }}
            </style>

          </head>

          <body>

            <h1>📦 Ultra Zip Engine Release</h1>

            <div class="box">
              <p>📅 Date: {now.strftime("%Y/%m/%d")}</p>
              <p>🕒 Time: {now.strftime("%H:%M:%S")}</p>
            </div>

            <table>
              <tr>
                <th>File</th>
                <th>Size</th>
                <th>SHA256</th>
              </tr>
          '''

          for file in os.listdir('output'):

              path = os.path.join('output', file)

              if os.path.isfile(path):

                  size = round(os.path.getsize(path)/1024/1024,2)

                  sha = hashlib.sha256(open(path,'rb').read()).hexdigest()

                  html += f'''
                  <tr>
                    <td>{file}</td>
                    <td>{size} MB</td>
                    <td>{sha[:32]}...</td>
                  </tr>
                  '''

          html += '''
            </table>

          </body>
          </html>
          '''

          open('output/index.html','w',encoding='utf8').write(html)

          EOF

      #######################################################
      # DELETE OLD RELEASES
      #######################################################

      - name: Delete Old Releases
        uses: dev-drprasad/delete-older-releases@v0.2.1
        with:
          keep_latest: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      #######################################################
      # CREATE RELEASE
      #######################################################

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-${{ github.run_id }}
          name: Release-${{ github.run_id }}
          files: output/*

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
